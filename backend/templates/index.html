{% load static %}
{% load vite_tags %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">

    <!-- SEO básico -->
    <title>{{ seo_title|default:"Jovamna Medina | Portfolio profesional de Desarrollo Web Full Stack" }}</title>
    <meta name="description" content="{{ seo_description|default:'Portfolio profesional de Desarrollo Web Full Stack...' }}">
    <meta name="robots" content="{{ seo_robots|default:'index,follow' }}">

    <!-- Canonical -->
    <link rel="canonical" href="{{ canonical_url|default:request.build_absolute_uri }}">

    <!-- ==================== OPEN GRAPH ==================== -->
    <meta property="og:locale" content="es_ES">
    <meta property="og:type" content="{{ og_type|default:'website' }}">
    <meta property="og:site_name" content="{{ SITE_NAME|default:'Jovamna Medina' }}">
    <meta property="og:title" content="{{ og_title|default:seo_title }}">
    <meta property="og:description" content="{{ og_description|default:seo_description }}">
    <meta property="og:image" content="{{ og_image|default:seo_image|default:'https://jovamnamedina.com/custom-static/images/facebookweb.jpg' }}">
    <meta property="og:image:alt" content="{{ seo_title }}">
    <meta property="og:url" content="{{ og_url|default:canonical_url|default:request.build_absolute_uri }}">

    <!-- ==================== TWITTER CARDS ==================== -->
    <meta name="twitter:card" content="{{ twitter_card|default:'summary_large_image' }}">
    <meta name="twitter:title" content="{{ twitter_title|default:seo_title }}">
    <meta name="twitter:description" content="{{ twitter_description|default:seo_description }}">
    <meta name="twitter:image" content="{{ twitter_image|default:seo_image|default:'https://jovamnamedina.com/custom-static/images/facebookweb.jpg' }}">

    <!-- Keywords -->
    <meta name="keywords" content="{{ seo_keywords|default:'' }}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">



    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" 
      rel="stylesheet"
    >

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">



    <!-- Preload & Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://jovamnamedina.com">


    




    <!-- JSON-LD Dinámico (lo que enviamos desde spa_entrypoint) -->
    {% if jsonld_primary %}
    <script type="application/ld+json">
    {{ jsonld_primary|safe }}
    </script>
    {% endif %}

    {% if jsonld_breadcrumbs %}
    <script type="application/ld+json">
    {{ jsonld_breadcrumbs|safe }}
    </script>
    {% endif %}

    <!-- JSON-LD Fallback (Persona) -->
    {% if not jsonld_primary %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Jovamna Medina",
      "url": "https://jovamnamedina.com",
      "jobTitle": "Full Stack Developer",
      "description": "Desarrolladora Full Stack especializada en Django y React."
    }
    </script>
    {% endif %}

    {% vite_asset_tags 'index.html' %}
</head>

<body>
    <div id="root"></div>
</body>
</html>
